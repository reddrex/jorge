baseURL = "https://reddrex.github.io/jorge/"
languageCode = "en-us"
title = "Jorge Zamora Rey"
theme = "terminal"
canonifyURLs = true

[pagination]
pagerSize = 10

[params]
contentTypeName = "posts"
themeColor = "green"
showMenuItems = 4
fullWidthTheme = false
centerTheme = true

[languages]
  [languages.en]
    languageName = "English"
    title = "Jorge Zamora Rey"
    subtitle = "NLP / ML Systems / Computer Engineering"
    owner = "Jorge Zamora Rey"

    [languages.en.params.logo]
      logoText = "reddrex@cv ~"
      logoHomeLink = "/jorge/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "cv"
        name = "CV"
        url = "/jorge/cv/"
        weight = 1

      [[languages.en.menu.main]]
        identifier = "projects"
        name = "Projects"
        url = "/jorge/projects/"
        weight = 2

      [[languages.en.menu.main]]
        identifier = "publications"
        name = "Publications & others"
        url = "/jorge/publications/"
        weight = 3

      [[languages.en.menu.main]]
        identifier = "contact"
        name = "Contact"
        url = "/jorge/contact/"
        weight = 4

[module]
  [module.hugoVersion]
    extended = true
    min = '0.90.0'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
